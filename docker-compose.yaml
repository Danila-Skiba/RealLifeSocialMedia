networks:
  omstu-network:
    name: omstu-network
    driver: bridge

volumes:
  postgres-data:

services:

  postgres:
    image: postgres:15-alpine
    ports:
      - "5430:5432"
    container_name: omstu-postgres
    environment:
      POSTGRES_USER: omstu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: omstu_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - omstu-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./theme-project/auth-service
      dockerfile: Dockerfile
    container_name: omstu-auth
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://omstu:${POSTGRES_PASSWORD}@omstu-postgres/omstu_db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
    depends_on:
      - postgres
    networks:
      - omstu-network
    restart: unless-stopped

  news-service:
    build:
      context: ./theme-project/news-service
      dockerfile: Dockerfile
    container_name: omstu-news
    ports:
      - "8001:8000"
    volumes:
      - ./theme-project/news-service/data:/app/data
    networks:
      - omstu-network
    restart: unless-stopped

  schedule-service:
    build:
      context: ./theme-project/schedule-service
      dockerfile: Dockerfile
    container_name: omstu-schedule
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://omstu:${POSTGRES_PASSWORD}@omstu-postgres/omstu_db
      - SCHEDULE_TTL_HOURS=2
    depends_on:
      - postgres
    networks:
      - omstu-network
    restart: unless-stopped

  lecture-service:
    build:
      context: ./theme-project/lecture-service
      dockerfile: Dockerfile
    container_name: omstu-lecture
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://omstu:${POSTGRES_PASSWORD}@omstu-postgres/omstu_db
      - GIGACHAT_API=${GIGACHAT_API}
      - GIGACHAT_SCOPE=GIGACHAT_API_PERS
      - AUTH_SERVICE_URL=http://omstu-auth:8000
    depends_on:
      - postgres
      - auth-service
    networks:
      - omstu-network
    restart: unless-stopped

  gateway:
    build:
      context: ./theme-project/gateway
      dockerfile: Dockerfile
    container_name: omstu-gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://omstu-auth:8000
      - NEWS_SERVICE_URL=http://omstu-news:8000
      - SCHEDULE_SERVICE_URL=http://omstu-schedule:8000
      - LECTURE_SERVICE_URL=http://omstu-lecture:8000
    depends_on:
      - auth-service
      - news-service
      - schedule-service
      - lecture-service
    networks:
      - omstu-network
    restart: unless-stopped